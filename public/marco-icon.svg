  <path d="M68 96 Q64 88 70 84 Q66 78 72 76 Q70 70 76 68" fill="none" stroke="#1A1A1A" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M80 92 Q78 84 82 80 Q80 74 84 70 Q82 66 86 62" fill="none" stroke="#1A1A1A" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M92 90 Q90 82 94 78 Q92 72 96 68 Q94 62 98 58" fill="none" stroke="#1A1A1A" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M104 90 Q106 82 102 78 Q104 72 100 68 Q102 62 98 58" fill="none" stroke="#1A1A1A" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M116 92 Q118 84 114 80 Q116 74 112 70 Q114 66 110 62" fill="none" stroke="#1A1A1A" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M128 96 Q132 88 126 84 Q130 78 124 76 Q126 70 122 68" fill="none" stroke="#1A1A1A" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Chef hat body -->
  <path d="M64 72 Q62 44 78 36 Q88 28 100 30 Q112 28 122 36 Q138 44 136 72"
        fill="white" stroke="#1A1A1A" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Hat band -->
  <rect x="64" y="68" width="72" height="8" rx="2" fill="white" stroke="#1A1A1A" stroke-width="2" />

  <!-- M on hat -->
  <text x="100" y="60" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#1A1A1A">M</text>

  <!-- Sunglasses -->
  <rect x="70" y="106" width="22" height="14" rx="3" fill="#1A1A1A"/>
  <rect x="108" y="106" width="22" height="14" rx="3" fill="#1A1A1A"/>
  <path d="M92 112 L108 112" stroke="#1A1A1A" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M70 112 L64 108" stroke="#1A1A1A" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M130 112 L136 108" stroke="#1A1A1A" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Slight lens shine -->
  <rect x="74" y="109" width="6" height="2" rx="1" fill="#444" opacity="0.5"/>
  <rect x="112" y="109" width="6" height="2" rx="1" fill="#444" opacity="0.5"/>

  <!-- Smile -->
  <path d="M88 136 Q100 144 112 136" fill="none" stroke="#1A1A1A" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Ears (small) -->
  <ellipse cx="68" cy="118" rx="5" ry="7" fill="#FDEBD0" stroke="#1A1A1A" stroke-width="2"/>
  <ellipse cx="132" cy="118" rx="5" ry="7" fill="#FDEBD0" stroke="#1A1A1A" stroke-width="2"/>
</svg>
